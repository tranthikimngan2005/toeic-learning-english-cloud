services:
  backend:
    container_name: pengwin-backend
    build:
      context: ./backend/lingai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./lingai.db
    volumes:
      - ./backend/lingai:/app
    working_dir: /app
    networks:
      - english_app

  frontend:
    container_name: pengwin-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - english_app

networks:
  english_app:
    driver: bridge
