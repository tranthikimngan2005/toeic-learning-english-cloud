services:
  backend:
    container_name: pengwin-backend
    build:
      context: ./backend/lingai
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=sqlite:///./lingai.db
    volumes:
      - ./backend/lingai:/app
    working_dir: /app
    networks:
      - english_app

  gateway:
    container_name: pengwin-gateway
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - english_app

  frontend:
    container_name: pengwin-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - HOST=0.0.0.0
      - PORT=5173
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - gateway
    networks:
      - english_app

networks:
  english_app:
    driver: bridge
